# Nombre del microservicio (Requisito para Eureka más adelante)
spring.application.name=ms-catalogo

# Puerto en el que correrá este servicio
server.port=8081

# Configuración de la Base de Datos H2 (En memoria para pruebas rápidas)
spring.datasource.url=jdbc:h2:mem:catalogodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Permitir ver la consola de la base de datos en el navegador
spring.h2.console.enabled=true

# JPA / Hibernate: Crea las tablas automáticamente basado en tu @Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true